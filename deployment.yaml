apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
  namespace: gitops-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
        - name: gitops-app
          image: ghcr.io/sirkeeper/gitops-app:61b3bf0
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gitops-app
  namespace: gitops-app
spec:
  selector:
    app: gitops-app
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: gitops-app
  namespace: gitops-app
spec:
  to:
    kind: Service
    name: gitops-app
  port:
    targetPort: 8080
  tls:
    termination: edge